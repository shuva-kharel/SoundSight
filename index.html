<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SoundSight</title>
<style>
  :root { --bg:#000; --fg:#fff; --accent:#ffd400; --ok:#00c853; }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font-family: system-ui, sans-serif; text-align: center;
  }
  h1 { margin: .4em 0; font-size: 1.6rem; letter-spacing: .05em; }
  #stage { position: relative; max-width: 720px; margin: 0 auto; }
  #video, #overlay { width: 100%; display: block; border-radius: 8px; }
  #overlay { position: absolute; top: 0; left: 0; pointer-events: none; }
  #controls {
    display: flex; gap: 12px; justify-content: center;
    flex-wrap: wrap; margin: 16px auto; max-width: 720px; padding: 0 12px;
  }
  button.mode {
    flex: 1 1 180px; min-height: 84px; font-size: 1.5rem; font-weight: 800;
    color: #000; background: var(--fg); border: 4px solid var(--fg);
    border-radius: 12px; cursor: pointer;
  }
  button.mode:focus-visible { outline: 5px solid var(--accent); outline-offset: 3px; }
  button.mode[aria-pressed="true"] { background: var(--accent); border-color: var(--accent); }
  #status {
    font-size: 1.25rem; padding: 14px; margin: 8px auto; max-width: 720px;
    background: #111; border-radius: 8px; min-height: 1.6em;
  }
  .hint { color: #aaa; font-size: .95rem; margin-bottom: 24px; }
  #caption {
    font-size: 1.05rem; color: var(--accent); min-height: 1.4em;
    max-width: 720px; margin: 4px auto; font-style: italic;
  }
  button.mode[aria-pressed="true"]#btnVoice { background: var(--ok); border-color: var(--ok); color:#000; }
  #hud { display:flex; align-items:center; gap:8px; justify-content:center; flex-wrap:wrap;
         max-width:720px; margin:6px auto; }
  #hud .hud-label { color:#7d8a99; font-size:.9rem; }
  .submode { padding:5px 12px; border-radius:14px; border:1px solid #2a3543; background:#161b22;
             color:#9fb0c0; font-size:.85rem; cursor:pointer; }
  .submode[aria-pressed="true"] { background: var(--accent); border-color: var(--accent); color:#000; font-weight:600; }
  .light-pill { padding:4px 12px; border-radius:14px; font-weight:700; font-size:.85rem; }
  .light-pill.red   { background:#ff1744; color:#fff; }
  .light-pill.amber { background:#ffb300; color:#000; }
  .light-pill.green { background:#00c853; color:#000; }
  #findPanel { max-width:720px; margin:6px auto; background:#11161d; border:1px solid #2a3543;
               border-radius:10px; padding:10px 14px; text-align:left; }
  #findPanel #findHead { font-weight:700; color:var(--accent); margin-bottom:6px; }
  #findPanel ul { list-style:none; margin:0 0 6px; padding:0; }
  #findPanel li { padding:3px 0; font-size:1.05rem; }
  #findPanel li b { display:inline-block; min-width:1.4em; color:#00d0ff; }
  #findPanel .dim, #findPanel li .dim { color:#7d8a99; font-size:.85rem; }
</style>
</head>
<body>
  <h1>👁️ SoundSight</h1>

  <div id="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <div id="controls">
    <button class="mode" id="btnNavigate" aria-pressed="false" accesskey="1">Navigate</button>
    <button class="mode" id="btnFind"     aria-pressed="false" accesskey="f">🔍 Find</button>
    <button class="mode" id="btnRead"     aria-pressed="false" accesskey="2">Read</button>
    <button class="mode" id="btnDescribe" aria-pressed="false" accesskey="3">Describe</button>
    <button class="mode" id="btnMoney"    aria-pressed="false" accesskey="4">💵 Money</button>
    <button class="mode" id="btnRepeat"   accesskey="5">🔁 Repeat</button>
    <button class="mode" id="btnLang"     accesskey="6">🌐 English</button>
  </div>

  <div id="hud">
    <span id="lightPill" class="light-pill"></span>
  </div>

  <div id="findPanel" style="display:none">
    <div id="findHead">Find</div>
    <ul id="findList"></ul>
    <div class="dim">F rescan · A–Z pick · R room scan · Esc exit</div>
  </div>

  <div id="status" role="status" aria-live="assertive">Starting camera…</div>
  <div id="caption" aria-live="polite"></div>
  <p class="hint">Keys: 1 Navigate · F Find (then A–Z pick · R room scan · Esc exit) · 2 Read · 3 Describe · 4 Money · 5 Repeat · 6 Language (English/Nepali) · C Crossing · H Help.</p>

<script>
"use strict";

const video   = document.getElementById("video");
const overlay = document.getElementById("overlay");
const octx    = overlay.getContext("2d");
const statusEl= document.getElementById("status");

const buttons = {
  navigate: document.getElementById("btnNavigate"),
  read:     document.getElementById("btnRead"),
  describe: document.getElementById("btnDescribe"),
  money:    document.getElementById("btnMoney"),
};
const btnRepeat = document.getElementById("btnRepeat");

// Hidden canvas used to downscale frames before sending to the backend.
const send = document.createElement("canvas");
const sctx = send.getContext("2d");

const SEND_WIDTH = 512;      // frames sent at this width: smaller = faster round-trip = less box lag
const FRAME_MS   = 60;       // ~16 fps -- the GPU does detect in ~12ms, so push the rate for tight tracking

let mode = null;             // "navigate" | "read" | "describe" | null
let ws = null;
let navTimer = null;
let lastFrame = { fw: SEND_WIDTH, fh: SEND_WIDTH };

let lastResult = null;       // {text, lang} from the last Read/Describe -> used by Repeat
let ttsAudio = null;         // <audio> currently playing a Nepali clip
let langMode = "en";         // "en" | "ne" -- toggled by the Language button

const btnLang = document.getElementById("btnLang");

function setStatus(msg) { statusEl.textContent = msg; }

// Language is a manual English/Nepali toggle (no auto-detect).
function effectiveLang(_detected) { return langMode; }

// --- Unified PRIORITY speech queue -----------------------------------------
// Only ONE thing speaks at a time, ranked: HAZARD (very-close / crossing) >
// ANSWER (replies to a command) > AMBIENT (background navigation). A higher
// priority interrupts a lower one; ambient never piles up behind speech. English
// uses the Web Speech API; Nepali uses the offline /tts WAV (cached per phrase).
const PRI = { AMBIENT: 1, ANSWER: 2, HAZARD: 3 };
let voiceRate = 1.0, voiceVolume = 1.0;   // adjusted by louder/softer/slower/faster
let sayQueue = [], curPlaying = null, ttsGen = 0;
const ttsCache = new Map();               // Nepali text -> object URL (session cache)

async function ttsUrl(text) {
  if (ttsCache.has(text)) return ttsCache.get(text);
  const form = new FormData();
  form.append("text", text); form.append("lang", "ne");
  const resp = await fetch("/tts", { method: "POST", body: form });
  if (!resp.ok) throw new Error("tts " + resp.status);
  const url = URL.createObjectURL(await resp.blob());
  ttsCache.set(text, url);
  return url;
}

function stopSpeech(clear = true) {
  ttsGen++;                                // invalidate any in-flight play
  try { speechSynthesis.cancel(); } catch (_) {}
  if (ttsAudio) { ttsAudio.pause(); ttsAudio = null; }
  curPlaying = null;
  if (clear) sayQueue = [];
}
const stopTtsAudio = () => stopSpeech(true);   // back-compat name (used by stopEverything)

function say(text, { lang, priority = PRI.ANSWER, rate = 1.0 } = {}) {
  if (!text) return;
  lang = lang || effectiveLang();
  const item = { text, lang, priority, rate };
  if (curPlaying) {
    if (priority > curPlaying.priority) { stopSpeech(true); sayQueue = [item]; playNext(); return; }
    if (priority === PRI.AMBIENT) return;  // don't pile ambient behind speech
    sayQueue.push(item); return;
  }
  sayQueue.push(item); playNext();
}

function playNext() {
  if (curPlaying) return;
  const item = sayQueue.shift();
  if (!item) return;
  curPlaying = item;
  const gen = ttsGen;
  const done = () => { if (gen === ttsGen) { curPlaying = null; playNext(); } };
  if (item.lang === "ne") {
    playNepaliOnce(item.text).then(done);
  } else {
    try {
      const u = new SpeechSynthesisUtterance(item.text);
      u.rate = (item.rate || 1.0) * voiceRate;
      u.volume = voiceVolume;
      u.onend = done; u.onerror = done;
      speechSynthesis.speak(u);
    } catch (_) { done(); }
  }
}

async function playNepaliOnce(text) {
  try {
    const url = await ttsUrl(text);
    await new Promise((res) => {
      ttsAudio = new Audio(url); ttsAudio.volume = voiceVolume;
      ttsAudio.onended = res; ttsAudio.onerror = res;
      ttsAudio.play().catch(res);
    });
  } catch (_) {   // espeak-ng/offline -> fall back to the browser voice
    await new Promise((res) => {
      const u = new SpeechSynthesisUtterance(text); u.volume = voiceVolume;
      u.onend = res; u.onerror = res;
      try { speechSynthesis.speak(u); } catch (_) { res(); }
    });
  }
}

// Back-compat wrappers so existing callers keep working.
function speak(text, { interrupt = false } = {}) {
  say(text, { lang: "en", priority: interrupt ? PRI.ANSWER : PRI.AMBIENT });
}
async function speakResult(text, detectedLang) {
  say(text, { lang: effectiveLang(detectedLang), priority: PRI.ANSWER });
}

// Capture the live video as a full-res JPEG blob (Read/Describe/Money/Cross).
function captureBlob(q = 0.92) {
  const cap = document.createElement("canvas");
  cap.width = video.videoWidth; cap.height = video.videoHeight;
  cap.getContext("2d").drawImage(video, 0, 0);
  return new Promise((res) => cap.toBlob(res, "image/jpeg", q));
}

// --- Mode / action dispatch -------------------------------------------------
// Navigate is a CONTINUOUS mode (a toggle). Read and Describe are ONE-SHOT
// actions: they fire once and must NOT route back through the toggle, or they'd
// cancel their own speech and wipe the status the moment they start.
function setMode(next) {
  if (next === "navigate") {
    const turningOn = mode !== "navigate";
    stopEverything();
    mode = turningOn ? "navigate" : null;
    updateButtons();
    if (turningOn) startNavigate();
    else { setStatus("Stopped."); speechSynthesis.cancel(); }
    return;
  }

  // One-shot action: stop the continuous navigate loop, then fire once.
  stopEverything();
  mode = null;
  updateButtons();
  if (next === "read") doRead();
  else if (next === "describe") describeScene();
  else if (next === "money") doMoney();
}

function updateButtons() {
  for (const [name, btn] of Object.entries(buttons)) {
    btn.setAttribute("aria-pressed", String(name === mode));
  }
}

function stopEverything() {
  if (navTimer) { clearInterval(navTimer); navTimer = null; }
  if (ws) { ws.close(); ws = null; }
  stopTtsAudio();   // stop any Nepali clip still playing
  octx.clearRect(0, 0, overlay.width, overlay.height);
}

// --- Navigate mode ----------------------------------------------------------
function startNavigate() {
  setStatus("Navigate: connecting…");
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}/ws/navigate`);

  ws.onopen    = () => { setStatus("Navigate: scanning…"); navTimer = setInterval(sendFrame, FRAME_MS); };
  ws.onclose   = () => { if (mode === "navigate") setStatus("Navigate: connection closed."); };
  ws.onerror   = () => setStatus("Navigate: connection error.");
  ws.onmessage = (e) => handleDetections(JSON.parse(e.data));
}

function sendFrame() {
  if (!ws || ws.readyState !== WebSocket.OPEN || !video.videoWidth) return;
  const scale = SEND_WIDTH / video.videoWidth;
  send.width  = SEND_WIDTH;
  send.height = Math.round(video.videoHeight * scale);
  sctx.drawImage(video, 0, 0, send.width, send.height);
  ws.send(send.toDataURL("image/jpeg", 0.6));
}

// Round a metric distance the same way the backend speaks it (0.25 m <2 m, 0.5 m >=2 m).
function distLabel(m) {
  if (m == null) return "";
  if (m < 0.5) return "very close";
  if (m < 2)  return "~" + (Math.round(m * 4) / 4) + " m";
  return "~" + (Math.round(m * 2) / 2) + " m";
}

function updateHud(msg) {
  const pill = document.getElementById("lightPill");
  const L = { red: "RED", amber: "AMBER", green: "GREEN" };
  if (msg.light && L[msg.light]) { pill.textContent = "● " + L[msg.light]; pill.className = "light-pill " + msg.light; }
  else { pill.textContent = ""; pill.className = "light-pill"; }
}

function handleDetections(msg) {
  lastFrame = { fw: msg.fw, fh: msg.fh };
  drawBoxes(msg.boxes || []);
  updateHud(msg);
  if (msg.finder) renderFinder(msg.finder);     // server-side finder: pick-list + target
  beaconUpdate(msg.beacon);                      // audio beacon during Find guidance

  // speak is a list of {text, text_ne, rate, urgent, urgency}.
  const items = msg.speak || [];
  if (!items.length) return;

  const ne = effectiveLang() === "ne";          // navigate has no detected lang
  const phrase = (it) => (ne ? (it.text_ne || it.text) : it.text);
  const anyUrgent = items.some((i) => i.urgent);
  setStatus((anyUrgent ? "⚠️ " : "🔊 ") + items.map(phrase).join(", "));

  // Route through the priority queue: hazards interrupt, ambient yields.
  for (const it of items) {
    say(phrase(it), {
      lang: ne ? "ne" : "en",
      priority: it.urgent ? PRI.HAZARD : PRI.AMBIENT,
      rate: it.rate || 1.0,
    });
  }
}

// Urgency -> bounding-box color (green far, yellow near, red very close).
const URGENCY_COLORS = { far: "#00e676", near: "#ffea00", "very close": "#ff1744" };

function drawBoxes(boxes) {
  // Match overlay pixel size to displayed video, then scale detection coords
  // (which are in the downscaled frame's space) up to display space.
  overlay.width  = video.clientWidth;
  overlay.height = video.clientHeight;
  const sx = overlay.width  / lastFrame.fw;
  const sy = overlay.height / lastFrame.fh;

  octx.clearRect(0, 0, overlay.width, overlay.height);
  octx.font = "16px system-ui, sans-serif";
  octx.textBaseline = "bottom";

  for (const b of boxes) {
    const [x1, y1, x2, y2] = b.box;
    const x = x1 * sx, y = y1 * sy, w = (x2 - x1) * sx, h = (y2 - y1) * sy;
    const color = URGENCY_COLORS[b.urgency] || "#00e676";
    octx.lineWidth = b.urgency === "very close" ? 5 : 3;  // thicker = more urgent
    octx.strokeStyle = color;
    octx.strokeRect(x, y, w, h);
    const dl = distLabel(b.distance_m);
    const label = `${b.label}${dl ? " " + dl : " " + ((b.confidence * 100) | 0) + "%"}`;
    octx.fillStyle = color;
    const tw = octx.measureText(label).width + 8;
    octx.fillRect(x, Math.max(0, y - 20), tw, 20);
    octx.fillStyle = "#000";
    octx.fillText(label, x + 4, Math.max(18, y - 2));
  }
}

// --- Read mode (one-shot) ---------------------------------------------------
// labelMode=true asks the backend to also parse expiry/dosage/product (labels.py).
async function doRead(labelMode = false) {
  if (!video.videoWidth) { setStatus("Camera not ready."); return; }
  buttons.read.setAttribute("aria-pressed", "true");   // show busy, don't latch
  setStatus(labelMode ? "Read: checking label…" : "Read: capturing…");

  const blob = await captureBlob(0.92);
  const form = new FormData();
  form.append("file", blob, "frame.jpg");
  if (labelMode) form.append("label", "true");

  setStatus("Read: recognizing text… (first run downloads OCR models, ~30s)");
  try {
    const resp = await fetch("/ocr", { method: "POST", body: form });
    const data = await resp.json();              // {text, text_ne?, lang}
    const lang = effectiveLang(data.lang || "en");
    const text = ((lang === "ne" && data.text_ne) ? data.text_ne : data.text || "").trim();
    lastResult = { text, lang };                 // remembered for Repeat
    setStatus((lang === "ne" ? "📖 (ने) " : "📖 ") + text);
    say(text, { lang, priority: PRI.ANSWER });
  } catch (err) {
    setStatus("Read failed: " + err);
    say("Read failed", { priority: PRI.ANSWER });
  } finally {
    buttons.read.setAttribute("aria-pressed", "false");
  }
}

// --- Describe mode (one-shot) -----------------------------------------------
// Captures one frame, POSTs to /describe (Gemini vision on the backend), and
// speaks the scene description.
async function describeScene() {
  if (!video.videoWidth) { setStatus("Camera not ready."); return; }
  buttons.describe.setAttribute("aria-pressed", "true");   // show busy, don't latch
  setStatus("Describe: looking…");
  speak("Describing", { interrupt: true });

  const cap = document.createElement("canvas");
  cap.width = video.videoWidth;
  cap.height = video.videoHeight;
  cap.getContext("2d").drawImage(video, 0, 0);

  const lang = effectiveLang();   // "ne" -> Gemini answers in Nepali (auto/en -> English)
  const blob = await new Promise((res) => cap.toBlob(res, "image/jpeg", 0.9));
  const form = new FormData();
  form.append("file", blob, "frame.jpg");
  form.append("lang", lang);

  try {
    const resp = await fetch("/describe", { method: "POST", body: form });
    const text = (await resp.text()).trim();
    lastResult = { text, lang };                 // remembered for Repeat
    setStatus((lang === "ne" ? "🗺️ (ने) " : "🗺️ ") + text);
    await speakResult(text, lang);               // Nepali -> /tts WAV, English -> Web Speech
  } catch (err) {
    setStatus("Describe failed: " + err);
    speak("Describe failed", { interrupt: true });
  } finally {
    buttons.describe.setAttribute("aria-pressed", "false");
  }
}

// --- Money mode (one-shot, TEMPORAL VOTING) ---------------------------------
// Captures ~10 frames over ~1s and POSTs them to /money, which votes: a value is
// announced only if one denomination wins a clear majority + passes the
// confidence/margin gate -- so an empty wall/hand NEVER yields a denomination.
const MONEY_FRAMES = 10, MONEY_GAP_MS = 90;

async function doMoney() {
  if (!video.videoWidth) { setStatus("Camera not ready."); return; }
  buttons.money.setAttribute("aria-pressed", "true");   // show busy, don't latch
  setStatus("Money: hold the note steady…");
  say("Hold the note steady", { priority: PRI.ANSWER });

  const form = new FormData();
  for (let i = 0; i < MONEY_FRAMES; i++) {
    form.append("files", await captureBlob(0.92), `f${i}.jpg`);
    await new Promise((r) => setTimeout(r, MONEY_GAP_MS));
  }

  try {
    const resp = await fetch("/money", { method: "POST", body: form });
    const d = await resp.json();   // {available, ok, class, confidence, text, text_ne}
    const lang = effectiveLang();
    const phrase = lang === "ne" ? (d.text_ne || d.text) : d.text;

    if (!d.available) {
      setStatus("💵 " + phrase);                 // model not trained yet
      say(phrase, { lang, priority: PRI.ANSWER });
      return;
    }
    const pct = Math.round((d.confidence || 0) * 100);
    const badge = d.ok ? "✓" : "⚠️";
    setStatus(`💵 ${d.ok ? d.class : "no note"} — ${pct}% ${badge}  →  ${phrase}`);
    lastResult = { text: phrase, lang };          // Repeat re-speaks it
    say(phrase, { lang, priority: PRI.ANSWER });  // Nepali -> /tts, English -> Web Speech
  } catch (err) {
    setStatus("Money failed: " + err);
    say("Money failed", { priority: PRI.ANSWER });
  } finally {
    buttons.money.setAttribute("aria-pressed", "false");
  }
}

// --- Repeat (re-speak last Read/Describe result, no re-capture) -------------
function repeatLast() {
  if (!lastResult || !lastResult.text) {
    setStatus("Nothing to repeat yet — use Read or Describe first.");
    speak("Nothing to repeat yet", { interrupt: true });
    return;
  }
  setStatus((effectiveLang(lastResult.lang) === "ne" ? "🔁 (ने) " : "🔁 ") + lastResult.text);
  speakResult(lastResult.text, lastResult.lang);
}

// --- Language button: English <-> Nepali (re-speaks last result) ------------
const LANG_CYCLE = ["en", "ne"];
const LANG_UI = {
  en:   { btn: "🌐 English", say: "English" },
  ne:   { btn: "🌐 नेपाली",  say: "Nepali" },
};
function cycleLang() {
  langMode = LANG_CYCLE[(LANG_CYCLE.indexOf(langMode) + 1) % LANG_CYCLE.length];
  btnLang.textContent = LANG_UI[langMode].btn;
  const hint = (lastResult && lastResult.text) ? " — press Repeat to re-hear" : "";
  setStatus("Language: " + LANG_UI[langMode].say + hint);
  speak("Language " + LANG_UI[langMode].say, { interrupt: true });  // audio cue for blind users
}

// ===========================================================================
// VOICE CONTROL -- hands-free assistant (Web Speech recognition + shared parser)
// ===========================================================================
const VOICE_CONF = 0.45;           // below this recognition confidence -> "say again"
let recog = null, listening = false, requireWake = true;
const captionEl = document.getElementById("caption");
const btnVoice  = document.getElementById("btnVoice");

function setCaption(t) { if (captionEl) captionEl.textContent = t ? ("🗣 " + t) : ""; }
function confirmSay(en, ne) {
  say(langMode === "ne" ? ne : en, { lang: langMode === "ne" ? "ne" : "en", priority: PRI.ANSWER });
}
function ensureNavigate() {         // assistant default: Navigate runs underneath
  if (mode !== "navigate") { stopEverything(); mode = "navigate"; updateButtons(); startNavigate(); }
}

function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setStatus("Voice not supported here — use Chrome or Edge."); return null; }
  const r = new SR();
  r.continuous = true; r.interimResults = true;
  r.lang = (langMode === "ne") ? "ne-NP" : "en-US";
  r.onresult = onRecog;
  r.onerror  = () => {};                                            // never throw
  r.onend    = () => { if (listening) { try { r.start(); } catch (_) {} } };   // auto-restart
  r.onspeechstart = () => { if (curPlaying) stopSpeech(true); };    // BARGE-IN: user talks -> stop
  return r;
}

// ONE assistant toggle: starts Navigate (ambient default) AND voice together, so
// the whole assistant comes alive with a single press. Turning it off stops both.
function toggleVoice() {
  if (listening) {
    listening = false; if (recog) { try { recog.stop(); } catch (_) {} }
    btnVoice.setAttribute("aria-pressed", "false"); btnVoice.textContent = "🎙️ Assistant";
    setCaption("");
    stopEverything(); mode = null; updateButtons();   // stop ambient Navigate too
    confirmSay("Assistant off", "सहायक बन्द"); return;
  }
  recog = initRecognition(); if (!recog) return;
  listening = true;
  btnVoice.setAttribute("aria-pressed", "true"); btnVoice.textContent = "🎙️ Assistant: On";
  ensureNavigate();                                   // Navigate is the ambient default
  try { recog.start(); } catch (_) {}
  confirmSay("Assistant on, navigating. Say hey sight, then a command. Hey sight help for options.",
             "सहायक चालु, हिँड्दै। हे साइट भनेर आदेश दिनुहोस्।");
}

async function onRecog(e) {
  let interim = "", final = "", conf = 1;
  for (let i = e.resultIndex; i < e.results.length; i++) {
    const res = e.results[i];
    if (res.isFinal) { final += res[0].transcript; conf = res[0].confidence || 0; }
    else interim += res[0].transcript;
  }
  if (interim) setCaption("… " + interim);
  if (!final.trim()) return;
  setCaption(final.trim());
  try {
    const form = new FormData(); form.append("text", final); form.append("conf", conf);
    const cmd = await (await fetch("/command", { method: "POST", body: form })).json();
    dispatchVoice(cmd, conf);
  } catch (_) {}
}

function dispatchVoice(cmd, conf) {
  if (requireWake && !cmd.wake) return;                       // ignore background speech
  if (cmd.action === "none") { if (cmd.wake) confirmSay("Yes?", "भन्नुहोस्?"); return; }
  if (conf > 0 && conf < VOICE_CONF) { confirmSay("Sorry, say that again", "माफ गर्नुहोस्, फेरि भन्नुहोस्"); return; }
  runAction(cmd);
}

// Map a parsed command to the EXISTING mode handlers (no duplicated logic).
function runAction(cmd) {
  switch (cmd.action) {
    case "navigate":    confirmSay("Navigating", "हिँड्दै"); ensureNavigate(); break;
    case "describe":    confirmSay("Describing", "वर्णन गर्दै"); describeScene(); break;
    case "read":        confirmSay("Reading", "पढ्दै"); doRead(false); break;
    case "label":       confirmSay("Checking the label", "लेबल हेर्दै"); doRead(true); break;
    case "money":       confirmSay("Checking the note", "नोट हेर्दै"); doMoney(); break;
    case "money_add":   moneyTally("add"); break;
    case "money_count": moneyCount(); break;
    case "money_total": moneyTally("total"); break;
    case "money_clear": moneyTally("clear"); break;
    case "money_undo":  moneyTally("undo"); break;
    case "money_pay":   moneyTally("pay", cmd.target); break;
    case "cross":       doCross(); break;
    case "how_far":     doHowFar(); break;
    case "scan":        doScan(); break;
    case "mode_street": setSubMode("street"); break;
    case "mode_public": setSubMode("public"); break;
    case "mode_home":   setSubMode("home"); break;
    case "find_mode":   enterFindMode(); break;
    case "find":        findClass(cmd.target); break;
    case "track":       chooseFind(cmd.target); break;
    case "room_scan":   roomScan(); break;
    case "found":       exitFindMode(); break;
    case "who":         doWho(); break;
    case "remember":    doRemember(cmd.target); break;
    case "repeat":      repeatLast(); break;
    case "stop":        stopSpeech(true); exitFindMode(); setCaption(""); break;
    case "louder":      adjustVolume(+0.15); break;
    case "softer":      adjustVolume(-0.15); break;
    case "faster":      adjustRate(+0.15); break;
    case "slower":      adjustRate(-0.15); break;
    case "help":        sayHelp(); break;
    case "sos":         doSOS(); break;
  }
  // one-shot modes run OVER the ambient Navigate stream, so the assistant always
  // returns to Navigate automatically (it was never stopped).
}

// --- SOS (emergency) -- works offline (loud local alert); online adds dispatch ---
let sosActive = false;
async function doSOS() {
  if (sosActive) return;
  sosActive = true;
  voiceVolume = 1.0;                                   // maximum volume
  setStatus("🆘 EMERGENCY — calling for help");
  document.body.style.background = "#5a0000";          // visual alarm for bystanders
  const en = "Emergency. This person needs help. Please assist.";
  const ne = "आपतकाल। यो व्यक्तिलाई सहयोग चाहिन्छ। कृपया मद्दत गर्नुहोस्।";
  for (let i = 0; i < 3; i++)                           // repeat, HAZARD interrupts all
    say(langMode === "ne" ? ne : en, { lang: langMode === "ne" ? "ne" : "en", priority: PRI.HAZARD });

  // Best-effort location + server dispatch -- degrades gracefully offline.
  let coords = null;
  try {
    coords = await new Promise((res) => navigator.geolocation
      ? navigator.geolocation.getCurrentPosition(
          (p) => res({ lat: p.coords.latitude, lon: p.coords.longitude }), () => res(null), { timeout: 4000 })
      : res(null));
  } catch (_) {}
  if (coords) setStatus(`🆘 EMERGENCY — location ${coords.lat.toFixed(4)}, ${coords.lon.toFixed(4)}`);
  try {
    const form = new FormData();
    if (coords) { form.append("lat", coords.lat); form.append("lon", coords.lon); }
    await fetch("/sos", { method: "POST", body: form });   // server hook (wire real SMS/contact)
  } catch (_) {}                                            // offline -> local alert already spoke
  setTimeout(() => { document.body.style.background = ""; sosActive = false; }, 8000);
}

function adjustVolume(d) {
  voiceVolume = Math.max(0.1, Math.min(1, voiceVolume + d));
  confirmSay(`Volume ${Math.round(voiceVolume*100)} percent`, `आवाज ${Math.round(voiceVolume*100)} प्रतिशत`);
}
function adjustRate(d) {
  voiceRate = Math.max(0.5, Math.min(2, voiceRate + d));
  confirmSay(`Speed ${voiceRate.toFixed(1)}`, `गति ${voiceRate.toFixed(1)}`);
}
function sayHelp() {
  confirmSay(
    "You can say: navigate, what's in front, how far, scan area, street mode, public mode, home mode, read this, read the label, how much, add this note, total, can I cross, find my, who's here, repeat, louder, slower, stop, or for emergency say hey sight help me.",
    "तपाईं भन्न सक्नुहुन्छ: हिँड, अगाडि के छ, कति टाढा, वरिपरि स्क्यान, सडक मोड, सार्वजनिक मोड, घर मोड, पढ, लेबल पढ, कति, नोट जोड, कुल, बाटो काट, खोज, यहाँ को छ, दोहोर्याउ, ठूलो, ढिलो, रोक, वा आपतकालका लागि हे साइट बचाउ भन्नुहोस्।");
}

// FIND mode: driven by the SERVER-SIDE finder over the Navigate WebSocket (same
// tested finder.py the Pi uses) -- scan -> pick-list -> lock -> beacon + guidance.
// The browser just sends control messages and renders the finder state it gets back;
// guidance lines arrive in msg.speak and are spoken by the normal queue.
let finderState = "idle";   // idle | scanning | picking | tracking

function wsSend(obj) {       // send a control message if the navigate WS is open
  if (ws && ws.readyState === WebSocket.OPEN) { ws.send(JSON.stringify(obj)); return true; }
  return false;
}
function whenNavOpen(fn, tries = 0) {   // ensure Navigate (the WS) is up, then run fn
  ensureNavigate();
  if (ws && ws.readyState === WebSocket.OPEN) fn();
  else if (tries < 20) setTimeout(() => whenNavOpen(fn, tries + 1), 100);
}
function enterFindMode() { whenNavOpen(() => wsSend({ cmd: "find_start" })); finderState = "scanning"; }
function findClass(t) {
  if (!t) { confirmSay("Find what?", "के खोज्ने?"); return; }
  whenNavOpen(() => wsSend({ cmd: "find_class", name: t.toLowerCase() }));
}
function chooseFind(t) { if (t) wsSend({ cmd: "find_choose", pick: String(t) }); }
function roomScan() { whenNavOpen(() => wsSend({ cmd: "room" })); }
function exitFindMode() { wsSend({ cmd: "find_exit" }); finderState = "idle"; beaconStop(); renderFinder(null); }

// Render the finder pick-list + locked target from each frame's msg.finder, and
// drive the audio beacon from msg.beacon.
function renderFinder(f) {
  const panel = document.getElementById("findPanel");
  if (!f || f.state === "idle") { panel.style.display = "none"; finderState = "idle"; return; }
  finderState = f.state;
  panel.style.display = "block";
  const head = document.getElementById("findHead");
  if (f.state === "scanning") { head.textContent = "Scanning… hold still"; document.getElementById("findList").innerHTML = ""; }
  else if (f.target) { head.textContent = "Tracking: " + f.target; document.getElementById("findList").innerHTML = ""; }
  else {
    head.textContent = "Pick a letter (or say it)";
    document.getElementById("findList").innerHTML = (f.pick || []).map(p =>
      `<li><b>${p.letter}</b> ${p.label} ${p.zone} <span class="dim">${distLabel(p.distance_m)}</span></li>`).join("");
  }
}

// --- Web Audio beacon: a beep whose interval shrinks as the target centers+nears ---
let audioCtx = null, beaconTimer = null;
function beep(freq = 880, dur = 0.05) {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.frequency.value = freq; o.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.18, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch (_) {}
}
function beaconDrive(b) {
  if (!b || !b.active) { beaconStop(); return; }
  const iv = Math.max(100, b.interval_ms || 500);
  if (beaconTimer) return;                    // already running; the rate is set on next stop/start
  const tick = () => { beep(); beaconTimer = setTimeout(tick, currentBeaconIv); };
  currentBeaconIv = iv; tick();
}
let currentBeaconIv = 500;
function beaconStop() { if (beaconTimer) { clearTimeout(beaconTimer); beaconTimer = null; } }
function beaconUpdate(b) {                      // keep the interval current each frame
  if (b && b.active) { currentBeaconIv = Math.max(100, b.interval_ms || 500); beaconDrive(b); }
  else beaconStop();
}

// DEMO mode: step the hero sequence on cue (key D) so a live demo can't stall.
// Each press advances + announces the step, then runs the real handler.
const DEMO = [
  { label: "Read a sign", run: () => doRead(false) },
  { label: "Crossing light", run: () => doCross() },
  { label: "Who's here", run: () => doWho() },
  { label: "Identify a banknote", run: () => doMoney() },
];
let demoIdx = 0;
function nextDemo() {
  const step = DEMO[demoIdx % DEMO.length]; demoIdx++;
  setStatus(`🎬 DEMO ${((demoIdx - 1) % DEMO.length) + 1}/${DEMO.length}: ${step.label}`);
  confirmSay("Demo: " + step.label, "डेमो: " + step.label);
  step.run();
}

// --- Wire up ----------------------------------------------------------------
buttons.navigate.addEventListener("click", () => setMode("navigate"));
buttons.read.addEventListener("click",     () => setMode("read"));
buttons.describe.addEventListener("click", () => setMode("describe"));
buttons.money.addEventListener("click",    () => setMode("money"));
btnRepeat.addEventListener("click", repeatLast);   // action, not a mode
btnLang.addEventListener("click", cycleLang);
const btnFind = document.getElementById("btnFind");
if (btnFind) btnFind.addEventListener("click", enterFindMode);

document.addEventListener("keydown", (e) => {
  if (e.target && /input|textarea/i.test(e.target.tagName)) return;
  const k = e.key.toLowerCase();
  // --- Find mode keys (take priority while Find is active) ------------------
  if (k === "f") { enterFindMode(); return; }                 // F = enter / rescan
  if (finderState !== "idle") {
    if (e.key === "Escape" || k === "q") { exitFindMode(); return; }   // Esc/Q = exit
    if (k === "r") { roomScan(); return; }                    // R = room scan
    if (/^[a-z]$/.test(k) && finderState === "picking") { chooseFind(k); return; }  // A-Z = pick
  }
  if (e.key === "1") setMode("navigate");
  else if (e.key === "2") setMode("read");
  else if (e.key === "3") setMode("describe");
  else if (e.key === "4" || k === "m") setMode("money");
  else if (e.key === "5") repeatLast();
  else if (e.key === "6" || k === "l") cycleLang();
  else if (e.key === "8") nextDemo();
  else if (k === "c") doCross();
  else if (k === "h") sayHelp();
});

// --- Camera startup ---------------------------------------------------------
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
  .then((stream) => {
    video.srcObject = stream;
    video.onloadedmetadata = () => setStatus("Ready. Press 7 (or 🎤) for hands-free voice, or 1 to Navigate.");
  })
  .catch((err) => setStatus("Camera error: " + err.message + " (allow camera access and reload)"));
